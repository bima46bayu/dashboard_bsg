services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev_password
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - atlas_pg_data:/var/lib/postgresql/data
      - ./server/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  adminer:
    image: adminer:latest
    container_name: atlas-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    ports:
      - "8080:8080"

volumes:
  atlas_pg_data:
